<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>DINO DIG: FINAL FORM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>DINO DIG</h1>
            <p class="tagline">Collect dino parts until its reach final form</p>
        </header>

        <div id="ui-layer">
            <div class="info-panel">
                <h2 id="current-player">Giliran: Pemain 1</h2>
                <div id="trace-indicator">Jejak T-Rex: <span id="trace-count">0</span> / 2</div>
            </div>
            
            <div class="action-panel">
                <button id="btn-stop" onclick="stopExpedition()">AMANKAN & STOP</button>
                <div id="dice-display">🎲 <span id="dice-value">-</span></div>
            </div>
        </div>

        <div id="hex-grid"></div>

        <div id="scoreboard">
            <div class="player-card" id="p1-card">
                <h3>Pemain 1</h3>
                <p>Skor: <span id="p1-score">0</span></p>
                <div class="inventory" id="p1-inv"></div>
            </div>
            <div class="player-card" id="p2-card">
                <h3>Pemain 2</h3>
                <p>Skor: <span id="p2-score">0</span></p>
                <div class="inventory" id="p2-inv"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
