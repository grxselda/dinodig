<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINO DIG: PANIC!</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --text-light: #ecf0f1;
            --hex-size: 45px; 
            --primary: #e67e22;
            --accent: #f1c40f;
            --danger: #e74c3c;
            --success: #2ecc71;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; /* Mencegah scroll menyamping di HP */
        }

        /* --- Layar Setup --- */
        #setup-container {
            text-align: center; background: rgba(0,0,0,0.5); padding: 40px 20px;
            border-radius: 20px; margin-top: 50px; border: 2px solid var(--accent);
            width: 90%; max-width: 600px; box-sizing: border-box;
        }
        #setup-container h1 { color: var(--accent); font-size: 2.5em; margin-bottom: 20px; }
        .setup-controls { margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;}
        .player-option {
            padding: 15px 20px; font-size: 1.1em; cursor: pointer;
            background-color: rgba(255,255,255,0.1); color: var(--text-light);
            border: 2px solid #ccc; border-radius: 8px; 
            font-weight: bold; transition: background 0.2s, border-color 0.2s;
            flex: 1; min-width: 140px;
        }
        .player-option.selected { background-color: var(--primary); border-color: var(--primary); color: white; }
        #btnStartGame {
            padding: 15px 40px; font-size: 1.3em; cursor: pointer;
            background-color: var(--accent); color: #333;
            border: none; border-radius: 5px; font-weight: bold;
            margin-top: 40px; display: none; width: 100%; max-width: 300px;
        }

        /* --- Kontainer Game Utama --- */
        #game-container { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 1000px;}
        header { text-align: center; margin-bottom: 15px; width: 100%; }
        header h1 { margin: 0; color: var(--accent); font-size: 2.2em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .game-status { 
            font-size: 1em; margin: 10px auto; padding: 10px 15px; 
            background: rgba(0,0,0,0.3); border-radius: 8px; display: inline-block;
        }
        .status-row { margin: 5px 0; }
        #threatStatus { color: var(--danger); font-weight: bold; }
        #globalThreatStatus { color: #e67e22; font-weight: bold; font-size: 0.9em;}
        
        /* Hexagon Grid Container (Lebar Fleksibel) */
        #board-container { 
            position: relative; width: 100%; max-width: 800px; height: 600px; margin: 0 auto; 
            overflow: hidden; /* Potong yang keluar batas container */
        }
        
        .hex {
            position: absolute; width: calc(var(--hex-size) * 1.732); height: calc(var(--hex-size) * 2);
            background-color: #8e44ad;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            cursor: pointer; transition: transform 0.2s, filter 0.2s;
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
            /* Pastikan titik origin transform ada di tengah agar scale tidak bergeser */
            transform-origin: center center;
        }
        
        .hex.hidden { background-image: url('card-back.webp'); background-color: #7f8c8d; }
        .hex.hidden:hover { transform: scale(1.05); filter: brightness(1.2); }
        .hex.invalid { cursor: not-allowed; opacity: 0.8; }
        .hex.highlight { border: 2px solid var(--accent); box-shadow: 0 0 15px var(--accent); z-index: 10;}
        .hex.bonus-mode { border: 3px solid #2ecc71; box-shadow: 0 0 20px #2ecc71; animation: pulse 1.5s infinite;}

        @keyframes pulse { 0% { box-shadow: 0 0 10px #2ecc71; } 50% { box-shadow: 0 0 25px #2ecc71; } 100% { box-shadow: 0 0 10px #2ecc71; } }
        
        .hex.skull { background-image: url('fossil-skull.webp'); background-color: #f1c40f; }
        .hex.ribcage { background-image: url('fossil-ribcage.webp'); background-color: #e67e22; }
        .hex.legs { background-image: url('fossil-legs.webp'); background-color: #3498db; }
        .hex.arms { background-image: url('fossil-arms.webp'); background-color: #2ecc71; }
        .hex.trex { background-image: url('threat-trex.webp'); background-color: var(--danger); }

        .game-controls { margin: 15px 0; }
        .game-controls button {
            padding: 12px 20px; font-size: 1.1em; cursor: pointer;
            background-color: var(--primary); color: white; border: none; 
            border-radius: 8px; font-weight: bold; width: 100%; max-width: 400px;
        }
        .game-controls button:disabled { background-color: #95a5a6; cursor: not-allowed; }

        /* Player Dashboards */
        #players { display: grid; gap: 15px; width: 100%; margin-top: 20px; }
        #players.count-2 { grid-template-columns: repeat(2, 1fr); }
        #players.count-3 { grid-template-columns: repeat(3, 1fr); }
        #players.count-4 { grid-template-columns: repeat(4, 1fr); }

        .player-card { 
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; 
            border: 2px solid transparent; position: relative;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .player-card.active { border-color: var(--accent); background: rgba(241, 196, 15, 0.15); box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);}
        .player-card h3 { margin: 0 0 10px 0; color: #fff; font-size: 1.1em;}
        
        .visual-inventory { display: flex; gap: 5px; justify-content: center; margin: 10px 0; min-height: 50px; flex-wrap: wrap; }
        .fossil-stack { position: relative; width: 35px; height: 45px; border-radius: 5px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .fossil-count { position: absolute; bottom: -5px; right: -5px; background: var(--primary); color: white; font-weight: bold; font-size: 0.75em; padding: 2px 5px; border-radius: 10px; border: 1px solid #fff; }
        
        .fossil-stack.skull { background-image: url('fossil-skull.webp'); background-color: rgba(241, 196, 15, 0.3); }
        .fossil-stack.ribcage { background-image: url('fossil-ribcage.webp'); background-color: rgba(230, 126, 34, 0.3); }
        .fossil-stack.legs { background-image: url('fossil-legs.webp'); background-color: rgba(52, 152, 219, 0.3); }
        .fossil-stack.arms { background-image: url('fossil-arms.webp'); background-color: rgba(46, 204, 113, 0.3); }
        
        .set-badge {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: white; font-weight: bold;
            font-size: 0.7em; padding: 4px 8px; border-radius: 12px;
            text-transform: uppercase; white-space: nowrap;
            border: 1px solid #fff; box-shadow: 0 0 10px rgba(46, 204, 113, 0.6); display: none; 
        }
        .player-card.has-set .set-badge { display: block; }

        .score { font-size: 1.5em; font-weight: bold; color: var(--accent); margin-top: auto;}

        /* Modals & Animasi Dadu */
        #diceModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px;
            text-align: center; z-index: 105; border: 4px solid var(--primary); display: none; width: 80%; max-width: 300px;
        }
        #diceModal h2 { margin: 0 0 10px 0; font-size: 1.3em; color: var(--primary); }
        .dice-visual { font-size: 80px; line-height: 1; color: #2c3e50; display: inline-block; }
        .shake-animation { animation: shake 0.4s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 2px) rotate(0deg); } 20% { transform: translate(-4px, 0px) rotate(15deg); } 40% { transform: translate(2px, -2px) rotate(-15deg); } 60% { transform: translate(-4px, 2px) rotate(15deg); } 80% { transform: translate(-2px, -2px) rotate(-15deg); } 100% { transform: translate(2px, 2px) rotate(0deg); } }

        #notification {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); padding: 25px; border-radius: 15px;
            text-align: center; z-index: 100; border: 2px solid var(--accent); display: none; width: 85%; max-width: 400px; box-sizing: border-box;
        }
        #notification h2 { margin-top: 0; color: var(--danger); font-size: 1.5em;}
        #notification.success h2 { color: var(--success); }
        #notification.declare-winner h2 { color: var(--accent); }
        #notification p { line-height: 1.4; font-size: 1em; }
        #notification button {
            padding: 12px 20px; cursor: pointer; background: var(--accent); width: 100%;
            border: none; border-radius: 5px; font-weight: bold; margin-top: 15px; font-size: 1.1em;
        }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 99; display: none; }

        /* --- MEDIA QUERIES UNTUK HP (RESPONSIVE) --- */
        @media (max-width: 768px) {
            header h1 { font-size: 1.8em; }
            #setup-container h1 { font-size: 2em; }
            .setup-controls { flex-direction: column; }
            .player-option { width: 100%; margin: 0;}
            
            /* Tumpuk pemain ke bawah di layar kecil */
            #players.count-2, #players.count-3, #players.count-4 {
                grid-template-columns: 1fr; 
            }
            .player-card { flex-direction: row; flex-wrap: wrap; justify-content: space-between; padding-top: 25px;}
            .player-card h3 { width: 100%; text-align: left; margin-bottom: 5px;}
            .set-badge { top: 5px; left: auto; right: 10px; transform: none; }
            .score { width: 100%; text-align: right; margin-top: 5px;}
            .visual-inventory { justify-content: flex-start; margin: 5px 0; width: 100%;}
            
            /* Papan dikecilkan */
            #board-container { height: 450px; }
            .game-status { font-size: 0.9em; width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>

    <div id="setup-container">
        <h1>🦕 DINO DIG 🦴</h1>
        <p>Tentukan jumlah Arkeolog dalam ekspedisi ini:</p>
        <div class="setup-controls">
            <button class="player-option" onclick="selectPlayerCount(2, this)">2 Pemain (37 Kartu)</button>
            <button class="player-option" onclick="selectPlayerCount(3, this)">3 Pemain (61 Kartu)</button>
            <button class="player-option" onclick="selectPlayerCount(4, this)">4 Pemain (91 Kartu)</button>
        </div>
        <button id="btnStartGame" onclick="confirmStart()">Mulai Gali!</button>
    </div>

    <div id="game-container">
        <header>
            <h1>DINO DIG: PANIC!</h1>
            <div class="game-status">
                <div class="status-row" id="statusText">Menunggu persiapan...</div>
                <div class="status-row">
                    <span id="threatStatus">Ancaman Giliran: 0/2</span> | 
                    <span id="globalThreatStatus">Total Jejak Terbuka: 0/0</span>
                </div>
            </div>
            <div class="game-controls">
                <button id="btnStop" onclick="startDiceRoll()" disabled>Mundur Aman & Lempar Dadu</button>
            </div>
        </header>

        <div id="board-container"></div>
        <div id="players"></div>
    </div>

    <div id="overlay"></div>
    <div id="diceModal">
        <h2>Mengocok Dadu...</h2>
        <div id="diceFace" class="dice-visual shake-animation">⚅</div>
    </div>
    <div id="notification">
        <h2 id="notifTitle">Peringatan!</h2>
        <p id="notifMsg">T-Rex mendekat...</p>
        <button onclick="closeNotif()" id="notifBtn">Lanjut</button>
    </div>

    <script>
        // SFX Audio
        const sfxFlip = new Audio('sfx-flip.mp3');
        const sfxSet = new Audio('sfx-set.mp3');
        const sfxWin = new Audio('sfx-win.mp3');
        sfxFlip.volume = 0.7; sfxSet.volume = 0.9; sfxWin.volume = 1.0;

        const BOARD_CONFIGS = {
            2: { radius: 3, hexSize: 45, deck: { skull: 4, ribcage: 6, legs: 7, arms: 7, trex: 13 } }, 
            3: { radius: 4, hexSize: 35, deck: { skull: 7, ribcage: 10, legs: 11, arms: 11, trex: 22 } }, 
            4: { radius: 5, hexSize: 28, deck: { skull: 10, ribcage: 15, legs: 17, arms: 17, trex: 32 } } 
        };

        let currentConfig = {};
        let deck = [];
        let grid = [];
        let players = []; 
        let selectedCount = 0;
        let currentPlayerIndex = 0;
        let turnData = { path: [], fossils: [], trex: 0 };
        let discardPile = [];
        let isBonusPhase = false; 
        let totalTrexRevealed = 0; 
        
        const DICE_FACES = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        function selectPlayerCount(count, el) {
            selectedCount = count;
            document.querySelectorAll('.player-option').forEach(btn => btn.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('btnStartGame').style.display = 'inline-block';
            document.getElementById('btnStartGame').innerText = `Mulai dengan ${count} Arkeolog!`;
        }

        function confirmStart() {
            if (selectedCount < 2) return; 
            currentConfig = BOARD_CONFIGS[selectedCount];
            players = [];
            for(let i=1; i <= selectedCount; i++) {
                players.push({
                    id: i, name: `Arkeolog ${i}`, 
                    fossils: { skull: 0, ribcage: 0, legs: 0, arms: 0 }, 
                    score: 0, setCount: 0
                });
            }
            document.getElementById('players').className = `count-${selectedCount}`;
            document.getElementById('setup-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            
            totalTrexRevealed = 0; 
            prepareBoard();
        }

        function prepareBoard() {
            deck = []; 
            const deckConfig = currentConfig.deck;
            for (let type in deckConfig) {
                for (let i = 0; i < deckConfig[type]; i++) deck.push(type);
            }
            deck.sort(() => Math.random() - 0.5);

            grid = []; 
            let cardIndex = 0;
            const radius = currentConfig.radius;
            
            for (let q = -radius; q <= radius; q++) {
                let r1 = Math.max(-radius, -q - radius);
                let r2 = Math.min(radius, -q + radius);
                for (let r = r1; r <= r2; r++) {
                    grid.push({ q: q, r: r, state: 'hidden', type: deck[cardIndex] });
                    cardIndex++;
                }
            }
            renderBoard();
            renderPlayers();
            updateTurnUI();
        }

        function renderBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = '';
            
            // LOGIKA RESPONSIVE: Hitung skala berdasarkan lebar layar vs lebar ideal (800)
            let screenWidth = container.clientWidth;
            let scaleFactor = screenWidth < 800 ? (screenWidth / 800) * 0.95 : 1; 
            
            const baseHexSize = currentConfig.hexSize;
            const scaledHexSize = baseHexSize * scaleFactor;
            document.documentElement.style.setProperty('--hex-size', scaledHexSize + 'px');

            // Titik tengah selalu mengikut dimensi dinamis container
            const centerX = container.clientWidth / 2; 
            const centerY = container.clientHeight / 2; 

            grid.forEach((hex, index) => {
                const el = document.createElement('div');
                el.className = `hex ${hex.state}`;
                if (hex.state === 'revealed') el.classList.add(hex.type);

                const x = centerX + scaledHexSize * Math.sqrt(3) * (hex.q + hex.r / 2);
                const y = centerY + scaledHexSize * 3/2 * hex.r;

                el.style.left = `${x - (scaledHexSize * Math.sqrt(3))/2}px`;
                el.style.top = `${y - scaledHexSize}px`;
                
                el.onclick = () => handleHexClick(index);
                
                if (hex.state === 'hidden') {
                    if (isBonusPhase) el.classList.add('bonus-mode'); 
                    else if (isValidMove(hex)) el.classList.add('highlight'); 
                    else el.classList.add('invalid'); 
                }
                container.appendChild(el);
            });
        }

        // Render ulang papan jika layar HP diputar (Landscape/Portrait)
        window.addEventListener('resize', () => {
            if (document.getElementById('game-container').style.display === 'flex') {
                renderBoard();
            }
        });

        function isValidMove(hex) {
            if (isBonusPhase) return true; 
            if (turnData.path.length === 0) return true; 
            const lastHex = grid[turnData.path[turnData.path.length - 1]];
            const isAdjacent = checkAdjacency(hex, lastHex);
            if (!isAdjacent) {
                const trapped = !grid.some(h => h.state === 'hidden' && checkAdjacency(h, lastHex));
                if (trapped) return true;
            }
            return isAdjacent;
        }

        function checkAdjacency(h1, h2) {
            const dq = h1.q - h2.q; const dr = h1.r - h2.r;
            return (dq===1 && dr===0) || (dq===1 && dr===-1) || (dq===0 && dr===-1) || 
                   (dq===-1 && dr===0) || (dq===-1 && dr===1) || (dq===0 && dr===1);
        }

        function handleHexClick(index) {
            const hex = grid[index];
            if (hex.state !== 'hidden') return;

            sfxFlip.currentTime = 0; 
            sfxFlip.play().catch(e => console.log(e));

            if (isBonusPhase) {
                hex.state = 'revealed';
                isBonusPhase = false; 
                if (hex.type !== 'trex') {
                    turnData.fossils.push(hex.type); saveFossils(); 
                    showNotif("Bonus Didapat! 🦴", `Kamu membuka Fosil. Giliran aman di Base Camp.`, true, true);
                } else {
                    totalTrexRevealed++; saveFossils(); 
                    showNotif("Bonus Zonk! 🦖", `Kartu bonus ternyata Jejak T-Rex! Giliran aman.`, true);
                }
                updateThreatUI(); renderBoard(); return;
            }

            if (!isValidMove(hex)) return;

            hex.state = 'revealed'; turnData.path.push(index);
            
            if (hex.type === 'trex') {
                turnData.trex++; totalTrexRevealed++; updateThreatUI();
                if (turnData.trex === 1) {
                    showNotif("AWAS! JEJAK T-REX!", "T-Rex mencium baumu. Jika 1 lagi terbuka, galian hancur!");
                } else {
                    showNotif("PANIK! T-REX MUNCUL!", "Galian hancur! Giliranmu berakhir tanpa hasil!", true); return; 
                }
            } else {
                turnData.fossils.push(hex.type);
                document.getElementById('btnStop').disabled = false;
            }
            renderBoard();
        }

        function startDiceRoll() {
            document.getElementById('btnStop').disabled = true;
            const diceModal = document.getElementById('diceModal');
            const diceFace = document.getElementById('diceFace');
            const overlay = document.getElementById('overlay');
            
            overlay.style.display = 'block'; diceModal.style.display = 'block';
            diceFace.classList.add('shake-animation');
            document.querySelector('#diceModal h2').innerText = "Mengocok Dadu...";

            let rollCount = 0;
            const rollInterval = setInterval(() => {
                diceFace.innerText = DICE_FACES[Math.floor(Math.random() * 6)];
                rollCount++;
                if (rollCount > 12) {
                    clearInterval(rollInterval);
                    const finalRoll = Math.floor(Math.random() * 6) + 1;
                    diceFace.innerText = DICE_FACES[finalRoll - 1]; 
                    diceFace.classList.remove('shake-animation');
                    document.querySelector('#diceModal h2').innerText = `Hasil: ${finalRoll}!`;
                    setTimeout(() => { diceModal.style.display = 'none'; processDiceResult(finalRoll); }, 1200);
                }
            }, 100);
        }

        function processDiceResult(roll) {
            if (roll >= 4) {
                isBonusPhase = true;
                document.getElementById('statusText').innerText = `🎲 Lemparanmu ${roll}! Pilih 1 kartu bonus!`;
                renderBoard(); 
                showNotif("Keberuntungan Arkeolog! 🎲", `Dadu angka ${roll}.<br>Silakan klik SATU kartu tertutup di papan.`);
            } else {
                saveFossils(); showNotif("Mundur Aman 🏕️", `Dadu angka ${roll}. Fosil berhasil diamankan!`, true, true);
            }
        }

        function saveFossils() {
            const player = players[currentPlayerIndex];
            turnData.fossils.forEach(f => player.fossils[f]++);
            calculateScore(player);
        }

        function calculateScore(player) {
            let f = player.fossils;
            let sets = Math.min(f.skull, f.ribcage, f.legs, f.arms);
            let score = 0;
            
            if (sets > player.setCount) { sfxSet.currentTime = 0; sfxSet.play().catch(e=>console.log(e)); }
            player.setCount = sets;

            if (sets === 1) score += 40;
            if (sets >= 2) score += 40 + ((sets - 1) * 50); 
            
            score += (f.skull - sets) * 15; 
            score += (f.ribcage - sets) * 8; 
            score += ((f.legs - sets) + (f.arms - sets)) * 3;
            player.score = score;
        }

        function nextTurn() {
            turnData = { path: [], fossils: [], trex: 0 };
            document.getElementById('btnStop').disabled = true;
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            updateTurnUI(); renderBoard();
            if (checkEndGame()) declareWinner();
        }

        function updateTurnUI() {
            document.getElementById('statusText').innerText = `Giliran: ${players[currentPlayerIndex].name} | Mulai Gali!`;
            updateThreatUI(); renderPlayers();
        }

        function updateThreatUI() {
            document.getElementById('threatStatus').innerText = `Ancaman Giliran: ${turnData.trex}/2`;
            document.getElementById('globalThreatStatus').innerText = `Total Jejak Terbuka: ${totalTrexRevealed}/${currentConfig.deck.trex}`;
        }

        function showNotif(title, msg, endsTurn = false, isSuccess = false, isWin = false) {
            const notif = document.getElementById('notification');
            document.getElementById('notifTitle').innerText = title;
            document.getElementById('notifMsg').innerHTML = msg; 
            notif.classList.remove('declare-winner', 'success');
            if(isWin) notif.classList.add('declare-winner'); else if(isSuccess) notif.classList.add('success');
            notif.style.display = 'block'; document.getElementById('overlay').style.display = 'block';
            notif.dataset.endsTurn = endsTurn; notif.dataset.isWin = isWin;
        }

        function closeNotif() {
            const notif = document.getElementById('notification');
            if(notif.dataset.isWin === 'true') { location.reload(); return; }
            notif.style.display = 'none'; document.getElementById('overlay').style.display = 'none';
            if (notif.dataset.endsTurn === 'true') {
                if (turnData.trex === 2) discardPile.push(...turnData.fossils); 
                nextTurn();
            }
        }

        function renderPlayers() {
            const container = document.getElementById('players');
            container.innerHTML = '';
            players.forEach((p, index) => {
                let cardClass = `player-card ${index === currentPlayerIndex ? 'active' : ''}`;
                if (p.setCount > 0) cardClass += ' has-set';
                container.innerHTML += `
                    <div class="${cardClass}">
                        <div class="set-badge">⭐ Set Lengkap: ${p.setCount}</div>
                        <h3>${p.name}</h3>
                        <div class="visual-inventory">
                            ${renderFossilStack('skull', p.fossils.skull)}
                            ${renderFossilStack('ribcage', p.fossils.ribcage)}
                            ${renderFossilStack('legs', p.fossils.legs)}
                            ${renderFossilStack('arms', p.fossils.arms)}
                        </div>
                        <div class="score">${p.score} Poin</div>
                    </div>
                `;
            });
        }

        function renderFossilStack(type, count) {
            if (count === 0) return ''; 
            return `<div class="fossil-stack ${type}"><div class="fossil-count">${count}x</div></div>`;
        }

        function checkEndGame() {
            if (grid.length === 0) return false;
            return grid.every(h => h.state !== 'hidden');
        }

        function declareWinner() {
            sfxWin.play().catch(e => console.log(e));
            document.getElementById('btnStop').disabled = true;
            document.getElementById('statusText').innerText = `MENGHITUNG POIN AKHIR...`;

            let maxSkulls = 0; let maxRibcages = 0;
            players.forEach(p => {
                if (p.fossils.skull > maxSkulls) maxSkulls = p.fossils.skull;
                if (p.fossils.ribcage > maxRibcages) maxRibcages = p.fossils.ribcage;
            });

            let bonusMsg = "<br><br><b>🏆 PENGHARGAAN MAYORITAS 🏆</b><br>";
            players.forEach(p => {
                if (p.fossils.skull === maxSkulls && maxSkulls > 0) {
                    p.score += 20; bonusMsg += `💀 ${p.name} (+20 Poin)<br>`;
                }
                if (p.fossils.ribcage === maxRibcages && maxRibcages > 0) {
                    p.score += 15; bonusMsg += `🦴 ${p.name} (+15 Poin)<br>`;
                }
            });

            renderPlayers(); 
            let sortedPlayers = [...players].sort((a, b) => b.score - a.score);
            let winner = sortedPlayers[0];
            let tiedPlayers = sortedPlayers.filter(p => p.score === winner.score);
            let winnerMsg = "";

            if(tiedPlayers.length > 1) {
                winnerMsg = `Hasil SEIMBANG! ${tiedPlayers.map(p => p.name).join(", ")} mengumpulkan ${winner.score} Poin!`;
            } else {
                winnerMsg = `Pemenangnya adalah <b>${winner.name}</b> dengan total <b>${winner.score} Poin</b>!`;
            }

            document.getElementById('notifBtn').innerText = "Main Lagi";
            showNotif("🏁 Ekskavasi Selesai! 🏁", winnerMsg + bonusMsg, false, false, true);
        }
    </script>
</body>
</html>
